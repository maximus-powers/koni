    sandbox: {mode: workspace-write, approval_policy: never, network_access: true, writable_roots: []}
  - id: dashboard-reporter
    codex_agent: dashboard-reporter
    model_role: ticket_worker
    sandbox: {mode: workspace-write, approval_policy: never, network_access: true, writable_roots: []}
  - id: reviewer
