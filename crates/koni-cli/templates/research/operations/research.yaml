    review_contract: pre-commit claim decomposition review
    output_contract: claim decomposition graph delta plus structured step outputs
    dispatch_priority: 810
    ranking_hints: [stage, claim-id, falsification-gap]

  - id: experiment-design.claim.design-experiment
    operation: design-experiment
    stage: experiment_design
    target_types: [claim]
    workflow: design-claim-experiment
    allowed_new_node_types: [experiment]
    allowed_existing_node_types: [claim]
    existing_node_edge_additions_only: {claim: [tested_by]}
    allow_node_deletion: false
    allow_gate_contract_edits: false
    gate_blocking_exempt: false
    change_control_barrier: false
    change_control: *ordinary_upstream_change
    review_contract: pre-commit experiment ontology and graph transition review rejecting static proof inspection traceability audit and review work modeled as experiments
    output_contract: empirical experiment graph delta with meaningful empirical_mode execution_protocol and observable_outcome plus structured step outputs
    dispatch_priority: 730
    ranking_hints: [stage, claim-id, claim-readiness]

  - id: experiment-design.hypothesis.design-experiment
    operation: design-experiment
    stage: experiment_design
    target_types: [hypothesis]
    workflow: design-experiment-portfolio
    allowed_new_node_types: [experiment]
    allowed_existing_node_types: [hypothesis, claim]
    existing_node_edge_additions_only: {hypothesis: [experiments], claim: [tested_by]}
    max_new_nodes: 3
    allow_node_deletion: false
    allow_gate_contract_edits: false
    gate_blocking_exempt: false
    change_control_barrier: false
    change_control: *ordinary_upstream_change
    review_contract: pre-commit experiment portfolio ontology and granularity review rejecting non-executed proof static inspection traceability audit review work and needless one-node-per-check atomization
    output_contract: at most three cohesive portfolio-level empirical programs covering related claim checks together; every experiment declares meaningful empirical_mode execution_protocol and observable_outcome plus structured step outputs
    dispatch_priority: 720
    ranking_hints: [stage, hypothesis-id, uncovered-claim-count, experiment-coverage]
    portfolio_guidance:
      preferred_count: 2
      unit: cohesive empirical program
      group_when: checks share an executable setup intervention observation mode or result interpretation
      split_when: checks require genuinely different subjects execution environments interventions or observables
      avoid: one experiment node per example assertion edge case or deterministic check

