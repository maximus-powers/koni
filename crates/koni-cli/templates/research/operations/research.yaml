operations:
  # Higher priorities run first. Bands preserve the research lifecycle while
  # leaving room for project-specific operations between bundled stages.
  - id: formulation.hypothesis.drill-hypothesis
    operation: drill-hypothesis
    stage: formulation
    target_types: [hypothesis]
    workflow: drill-hypothesis
    allowed_new_node_types: [claim, literature]
    allowed_existing_node_types: [hypothesis]
    allow_node_deletion: false
    allow_gate_contract_edits: false
    gate_blocking_exempt: false
    change_control_barrier: false
    change_control: &ordinary_upstream_change {role: ordinary, allow_upstream_requests: true, proposal_operation: change-request}
    review_contract: pre-commit graph transition review
    output_contract: claims and related-work graph delta plus structured step outputs
    dispatch_priority: 830
    ranking_hints: [stage, hypothesis-id, missing-obligations]

  - id: formulation.hypothesis.map-literature
    operation: map-literature
    stage: formulation
    target_types: [hypothesis, literature]
    workflow: standard-research-transition
    allowed_new_node_types: [literature]
    allowed_existing_node_types: [hypothesis, literature]
    allow_node_deletion: false
    allow_gate_contract_edits: false
    gate_blocking_exempt: false
    change_control_barrier: false
    change_control: *ordinary_upstream_change
    review_contract: pre-commit literature mapping review
