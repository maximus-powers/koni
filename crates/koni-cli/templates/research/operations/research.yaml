  - id: evidence-reports.node.synthesize-evidence
    operation: synthesize-evidence
    stage: evidence_reports
    target_types: [claim, evidence, experiment, method, run]
    workflow: synthesize-evidence
    allowed_new_node_types: [evidence, report]
    allowed_existing_node_types: [claim, evidence, report]
    receipt_coverage:
      candidate_node_types: [evidence]
      required_nodes:
        relations: [claims, experiments, tested_by, target_claims, ablations, runs]
        direction: both
        min_depth: 1
        max_depth: 4
        node_types: [run]
      candidate_link_relation: from_runs
      coverage: exact
      receipt_type: runtime.receipt
      receipt_statuses: [passed]
      receipt_refs_path: spec.receipt_refs
      disposition_map_path: spec.run_dispositions
      disposition:
        value_path: disposition
        receipt_id_path: receipt_id
        rationale_path: rationale
        allowed_values: [supports, contradicts, neutral, out_of_scope]
    allow_node_deletion: false
    allow_gate_contract_edits: false
    gate_blocking_exempt: false
    change_control_barrier: true
    change_control: *ordinary_upstream_change
    review_contract: pre-commit evidence synthesis review
    output_contract: evidence/report graph delta plus structured step outputs
    review_effects:
      - id: promote-candidate-evidence
        verdict: passed
        select:
          node_types: [evidence]
          predicate: {field: spec.promotion_state, op: absent}
        count: {exact: 1}
        preconditions:
          - {field: spec.summary, op: non_empty}
          - {field: spec.interpretation, op: non_empty}
          - {field: spec.evidence_basis, op: equals, value: empirical_runtime}
          - {field: spec.inference_scope, op: equals, value: bounded_empirical}
          - {field: spec.scope, op: non_empty}
          - {field: spec.limitations, op: non_empty}
          - {field: spec.receipt_refs, op: non_empty}
          - {field: spec.run_dispositions, op: non_empty}
          - {field: spec.promoted_by, op: absent}
          - {field: spec.promotion_review_id, op: absent}
        set:
          spec.promotion_state: lead-promoted
          spec.promoted_by: lead
          spec.promotion_review_id: "$review.id"
    dispatch_priority: 130
    ranking_hints: [stage, claim-id, evidence-gap]

