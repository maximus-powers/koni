  - id: evidence-reports.hypothesis.conclude-hypothesis
    operation: conclude-hypothesis
    stage: evidence_reports
    target_types: [hypothesis]
    workflow: conclude-hypothesis
    allowed_new_node_types: [report]
    allowed_existing_node_types: [report]
    allow_node_deletion: false
    allow_gate_contract_edits: false
    gate_blocking_exempt: false
    change_control_barrier: true
    change_control: *ordinary_upstream_change
    review_contract: pre-commit hypothesis adjudication review
    output_contract: reviewed hypothesis conclusion covering every claim and current promoted evidence atom
    review_effects:
      - id: accept-conclusion-report
        verdict: passed
        select:
          node_types: [report]
          predicate: {field: spec.conclusion, op: non_empty}
        count: {exact: 1}
        preconditions:
          - {field: spec.summary, op: non_empty}
          - {field: spec.synthesis, op: non_empty}
          - {field: spec.claim_dispositions, op: non_empty}
          - {field: spec.curated_evidence_refs, op: non_empty}
          - {field: spec.conclusion_rationale, op: non_empty}
          - {field: spec.limitations, op: non_empty}
          - {field: spec.hypothesis_id, op: non_empty}
          - {field: spec.paper_context_role, op: absent}
          - {field: spec.paper_input_role, op: absent}
          - {field: spec.paper_section, op: absent}
          - {field: spec.paper_input_status, op: absent}
          - {field: spec.concluded_by, op: absent}
          - {field: spec.conclusion_review_id, op: absent}
        coverage:
          - id: exact-claim-dispositions
            required: {traverse: {from: $target, relation: claims, direction: outgoing, max_depth: 1, node_types: [claim]}}
            actual:
              kind: object_keys
              field: spec.claim_dispositions
              allowed_values: [supported, contradicted, inconclusive]
          - id: exact-curated-evidence
            required: &current_conclusion_evidence
              intersection:
                - promoted-current-evidence
                - traverse:
                    from: {traverse: {from: $target, relation: claims, direction: outgoing, max_depth: 1, node_types: [claim]}}
                    relations: [supports, contradicts, informs]
                    direction: incoming
                    max_depth: 1
                    node_types: [evidence]
            actual: {kind: field_values, field: spec.curated_evidence_refs}
          - id: exact-evidence-citations
            required: *current_conclusion_evidence
            actual: {kind: outgoing_relation, relation: cites}
          - id: exact-target-hypothesis
            required: $target
            actual: {kind: outgoing_relation, relation: summarizes}
          - id: exact-hypothesis-reference
            required: $target
            actual: {kind: field_value, field: spec.hypothesis_id}
        set:
          spec.concluded_by: lead
          spec.conclusion_review_id: "$review.id"
    dispatch_priority: 110
    ranking_hints: [stage, hypothesis-id, claim-disposition-coverage]

