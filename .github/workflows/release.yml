name: release

on:
  push:
    tags:
      - "v*"

permissions:
  attestations: write
  contents: write
  id-token: write

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: Verify tag matches Cargo version
        shell: bash
        run: |
          version="$(cargo metadata --no-deps --format-version 1 | jq -r '.packages[] | select(.name == "koni-cli") | .version')"
          test "$GITHUB_REF_NAME" = "v$version"
      - run: cargo fmt --all --check
      - run: cargo clippy --workspace --all-targets --locked -- -D warnings
      - run: cargo test --workspace --locked
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check
      - run: ./scripts/check-brand.sh
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/docs/package-lock.json
      - run: npm ci
        working-directory: apps/docs
      - run: npm run lint
        working-directory: apps/docs
      - run: npm run typecheck
        working-directory: apps/docs
      - run: npm run build
        working-directory: apps/docs
      - run: npm audit --audit-level=moderate
        working-directory: apps/docs

  build:
    needs: validate
    name: ${{ matrix.asset }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            asset: x86_64-unknown-linux-gnu
          - os: ubuntu-24.04-arm
            asset: aarch64-unknown-linux-gnu
          - os: macos-13
            asset: x86_64-apple-darwin
          - os: macos-14
            asset: aarch64-apple-darwin
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Build release binary
        run: cargo build --locked --release --package koni-cli
      - name: Package binary
        id: package
        shell: bash
        run: |
          archive="koni-${GITHUB_REF_NAME}-${{ matrix.asset }}.tar.gz"
          tar -C target/release -czf "$archive" koni
          shasum -a 256 "$archive" > "$archive.sha256"
          echo "archive=$archive" >> "$GITHUB_OUTPUT"
      - uses: actions/attest-build-provenance@v2
        with:
          subject-path: ${{ steps.package.outputs.archive }}
      - uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.asset }}
          path: |
            koni-*.tar.gz
            koni-*.sha256

  publish:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true
      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "$GITHUB_REF_NAME" artifacts/* --generate-notes --verify-tag --repo "$GITHUB_REPOSITORY"
