personas:
  - id: run-planner
    prompt: personas/prompts/run-planner.md
    model_role: planner
    sandbox: {mode: read-only, approval_policy: never, network_access: true, writable_roots: []}
  - id: lead
    prompt: personas/prompts/lead.md
    model_role: lead
    # The Lead can inspect the checkout but has no direct write authority.
    # Compiler-issued lifecycle tools run through the required runtime MCP
    # broker, which Codex launches outside the shell-command sandbox.
    sandbox: {mode: read-only, approval_policy: never, network_access: false, writable_roots: []}
