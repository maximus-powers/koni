[graph]
all-features = true

[advisories]
ignore = [
  { id = "RUSTSEC-2024-0436", reason = "paste is a build-time transitive dependency of ratatui 0.29; it has no known vulnerability and will be removed with the next compatible ratatui upgrade" },
]

[licenses]
confidence-threshold = 0.8
allow = [
  "Apache-2.0",
  "Apache-2.0 WITH LLVM-exception",
  "BSD-2-Clause",
  "BSL-1.0",
  "MIT",
  "MIT-0",
  "Unicode-3.0",
  "Zlib",
]

[bans]
multiple-versions = "warn"
wildcards = "allow"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
